  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إضافة أداة جديدة - شاركها</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Navigation -->
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="nav-brand">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20"></path><path d="m17 5-5-3-5 3"></path><path d="m17 19-5 3-5-3"></path><path d="M2 12h20"></path><path d="m5 17-3-5 3-5"></path><path d="m19 17 3-5-3-5"></path></svg>
        شاركها

      <ul class="nav-links">
        <li><a href="index.html">الرئيسية</a></li>

        <li><a href="dashboard.html" class="active">لوحة التحكم</a></li>
      </ul>
    </div>
  </nav>

  <!-- Add Tool Layout -->
  <div class="auth-wrapper container">
    <div class="auth-card glass-panel animate-in" style="max-width: 600px;">
      <h2 class="text-center mb-4">إضافة أداة للإيجار</h2>
      <form id="add-tool-form">
        <div class="form-group">
          <label class="form-label" for="tool-name">اسم الأداة</label>
          <input type="text" id="tool-name" class="form-control" placeholder="مثال: مسطرة T مقاس 80 سم" required>
        </div>
        
        <div class="form-group">
          <label class="form-label" for="tool-category">التصنيف / الكلية</label>
          <select id="tool-category" class="form-control" required>
            <option value="">اختر التصنيف...</option>
            <option value="engineering">هندسة</option>
            <option value="medicine">طب / صيدلة / أسنان</option>
            <option value="science">علوم</option>
            <option value="arts">فنون جميلة / تطبيقية</option>
            <option value="other">أخرى</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label" for="tool-desc">الوصف والحالة</label>
          <textarea id="tool-desc" class="form-control" rows="4" placeholder="اذكر حالة الأداة (جديدة، مستعملة خفيف، الخ) وما إذا كانت تحتوي على ملحقات..." required></textarea>
        </div>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
          <div class="form-group">
            <label class="form-label" for="tool-price">سعر الإيجار (باليوم)</label>
            <div style="display: flex; align-items: center; gap: 0.5rem;">
              <input type="number" id="tool-price" class="form-control" placeholder="10" min="0" required>
              <span style="font-weight: 700; color: var(--text-muted);">ج.م</span>
            </div>
          </div>
          
          <div class="form-group">
            <label class="form-label" for="tool-image">صورة الأداة</label>
            <input type="file" id="tool-image" class="form-control" accept="image/*" required>
          </div>
        </div>
        
        <button type="submit" class="btn btn-primary mt-4" style="width: 100%;">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-left: 8px;"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
          نشر الأداة
        </button>
      </form>
    </div>
  </div>

  <!-- Footer -->
  <footer>
    <div class="container">
      <p>&copy; 2026 منصة شاركها. جميع الحقوق محفوظة.</p>
    </div>
  </footer>

  <script src="js/script.js"></script>
</body>
</html>
