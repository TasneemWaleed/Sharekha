<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>حساب جديد - شاركها</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Navigation -->
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="nav-brand">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20"></path><path d="m17 5-5-3-5 3"></path><path d="m17 19-5 3-5-3"></path><path d="M2 12h20"></path><path d="m5 17-3-5 3-5"></path><path d="m19 17 3-5-3-5"></path></svg>
        شاركها
      </a>
      <ul class="nav-links">
        <li><a href="index.html">الرئيسية</a></li>
        <li><a href="search.html">تصفح الأدوات</a></li>
        <li><a href="register.html" class="active btn btn-primary" style="color: white;">حساب جديد</a></li>
      </ul>
    </div>
  </nav>

  <!-- Auth Layout -->
  <div class="auth-wrapper container">
    <div class="auth-card glass-panel animate-in">
      <h2 class="text-center mb-4">إنشاء حساب طالب</h2>
      <form id="register-form">
        <div class="form-group">
          <label class="form-label" for="fullname">الاسم الرباعي</label>
          <input type="text" id="fullname" class="form-control" placeholder="أدخل اسمك الكامل" required>
        </div>
        
        <div class="form-group">
          <label class="form-label" for="email">البريد الجامعي (.edu)</label>
          <input type="email" id="email" class="form-control" placeholder="student@university.edu.eg" required>
        </div>
        
        <div class="form-group">
          <label class="form-label" for="faculty">الكلية</label>
          <select id="faculty" class="form-control" required>
            <option value="">اختر كليتك...</option>
            <option value="engineering">هندسة</option>
            <option value="medicine">طب / صيدلة / أسنان</option>
            <option value="science">علوم</option>
            <option value="arts">فنون تطبيقية / جميلة</option>
            <option value="other">أخرى</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label" for="phone">رقم الهاتف (للتواصل)</label>
          <input type="tel" id="phone" class="form-control" placeholder="01X XXXX XXXX" required>
        </div>
        
        <div class="form-group">
          <label class="form-label" for="id-photo">صورة الكارنيه الجامعي (للتحقق)</label>
          <input type="file" id="id-photo" class="form-control" accept="image/*" required>
          <small style="color: var(--text-muted); display: block; margin-top: 0.5rem;">لن يتم مشاركة هذه الصورة، وتستخدم فقط لتوثيق الحساب.</small>
        </div>
        
        <button type="submit" class="btn btn-primary mt-2" style="width: 100%;">تسجيل الحساب</button>
      </form>
      <div class="text-center mt-4">
        <p>لديك حساب بالفعل؟ <a href="#">تسجيل الدخول</a></p>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer>
    <div class="container">
      <p>&copy; 2026 منصة شاركها. جميع الحقوق محفوظة.</p>
    </div>
  </footer>

  <script src="js/script.js"></script>
</body>
</html>
