<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>شاركها - منصة مشاركة الأدوات الجامعية</title>
  <meta name="description" content="منصة للطلاب الجامعيين لاستعارة وتأجير الأدوات الأكاديمية بسهولة. شارك أدواتك وسهل حياتك.">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Navigation -->
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="nav-brand">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20"></path><path d="m17 5-5-3-5 3"></path><path d="m17 19-5 3-5-3"></path><path d="M2 12h20"></path><path d="m5 17-3-5 3-5"></path><path d="m19 17 3-5-3-5"></path></svg>
        شاركها
      </a>
      <ul class="nav-links">
        <li><a href="index.html" class="active">الرئيسية</a></li>
        <li><a href="search.html">تصفح الأدوات</a></li>
        <li><a href="dashboard.html">لوحة التحكم</a></li>
        <li><a href="register.html" class="btn btn-primary" style="color: white;">حساب جديد</a></li>
      </ul>
    </div>
  </nav>

  <!-- Hero Section -->
  <section class="hero">
    <div class="hero-bg"></div>
    <div class="container">
      <div class="hero-content animate-in">
        <h1 class="hero-title">شارك أدواتك..<br>سهّل حياتك الجامعية!</h1>
        <p class="hero-subtitle">المنصة الأولى للطلاب لاستعارة وتأجير الأدوات الهندسية، الطبية، والفنية بأسعار رمزية.</p>
        
        <form action="search.html" method="GET" class="search-bar-wrapper">
          <input type="text" name="q" placeholder="ابحث عن أداة (مثال: بالطو طبي، مسطرة T)..." required>
          <button type="submit" class="btn btn-primary">بحث</button>
        </form>
      </div>
    </div>
  </section>

  <!-- Featured Tools -->
  <section class="container mt-4 mb-4">
    <h2 class="text-center mb-4">أدوات مميزة هذا الأسبوع</h2>
    <div class="tools-grid" id="featured-tools">
      <!-- Tools will be injected here by script.js -->
    </div>
    <div class="text-center mt-4">
      <a href="search.html" class="btn btn-outline">عرض جميع الأدوات</a>
    </div>
  </section>

  <!-- Footer -->
  <footer>
    <div class="container">
      <p>&copy; 2026 منصة شاركها. جميع الحقوق محفوظة.</p>
    </div>
  </footer>

  <script src="js/script.js"></script>
